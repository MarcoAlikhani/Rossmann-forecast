name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Train a tiny model for the image
        # CI doesn't have your full data; we need *some* model artifact for the
        # image to load at startup. Train a 1-tree model on synthetic data.
        run: |
          mkdir -p models
          python -c "
          import joblib, json, numpy as np, pandas as pd
          from sklearn.ensemble import RandomForestRegressor
          rng = np.random.default_rng(0)
          cols = ['Store','DayOfWeek','Open','Promo','SchoolHoliday',
                  'CompetitionDistance','CompetitionOpenSinceMonth',
                  'CompetitionOpenSinceYear','Promo2','Promo2SinceWeek','Promo2SinceYear']
          X = pd.DataFrame(rng.integers(0, 10, size=(100, len(cols))), columns=cols)
          y = pd.Series(rng.integers(1000, 9000, size=100))
          model = RandomForestRegressor(n_estimators=2, random_state=0).fit(X, y)
          joblib.dump(model, 'models/forecast_model.joblib')
          json.dump({
              'data_hash': 'ci-smoke',
              'trained_at': '2026-01-01T00:00:00Z',
              'feature_columns': cols,
          }, open('models/forecast_model_metadata.json','w'))
          "

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rossmann-forecast:ci

      - name: Boot smoke test
        # Start the container, wait, hit /health, kill it. If health doesn't
        # return 200 within 30 seconds, the test fails.
        run: |
          docker run -d --name smoke -p 8000:8000 rossmann-forecast:ci
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health; then
              echo ""
              echo "✅ Container is healthy"
              docker logs smoke
              docker rm -f smoke
              exit 0
            fi
            echo "Waiting for container... ($i/30)"
            sleep 1
          done
          echo "❌ Container never became healthy"
          docker logs smoke
          docker rm -f smoke
          exit 1