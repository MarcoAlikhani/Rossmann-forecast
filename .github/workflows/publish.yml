name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install minimal deps for smoke model
        run: |
          python -m pip install --upgrade pip
          pip install joblib numpy pandas scikit-learn

      - name: Train CI smoke model
        run: |
          mkdir -p models
          python -c "
          import joblib, json, numpy as np, pandas as pd
          from sklearn.ensemble import RandomForestRegressor
          rng = np.random.default_rng(0)
          cols = ['Store','DayOfWeek','Open','Promo','SchoolHoliday',
                  'CompetitionDistance','CompetitionOpenSinceMonth',
                  'CompetitionOpenSinceYear','Promo2','Promo2SinceWeek','Promo2SinceYear']
          X = pd.DataFrame(rng.integers(0, 10, size=(100, len(cols))), columns=cols)
          y = pd.Series(rng.integers(1000, 9000, size=100))
          model = RandomForestRegressor(n_estimators=2, random_state=0).fit(X, y)
          joblib.dump(model, 'models/forecast_model.joblib')
          json.dump({
              'data_hash': 'ci-smoke',
              'trained_at': '2026-01-01T00:00:00Z',
              'feature_columns': cols,
          }, open('models/forecast_model_metadata.json','w'))
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$REPO_LOWER" >> $GITHUB_OUTPUT
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_short }}