# Data paths
data:
  raw_train: "data/raw/train.csv"
  raw_store: "data/raw/store.csv"
  processed: "data/processed/training_data.parquet"

# Model output
model:
  output_path: "models/forecast_model.joblib"
  metadata_path: "models/forecast_model_metadata.json"

# Preprocessing
preprocessing:
  drop_columns: ["StateHoliday", "StoreType", "Assortment", "PromoInterval"]
  drop_zero_sales: true
  fill_na_value: 0

# Train/test split — TIME-AWARE this time
split:
  test_size_fraction: 0.2  # last 20% by date

# Model hyperparameters
model_params:
  n_estimators: 100
  max_depth: 15
  min_samples_leaf: 5
  n_jobs: -1
  random_state: 42

# Reproducibility
seed: 42