services:
  forecast-api:
    build: .
    image: rossmann-forecast:latest
    container_name: rossmann-forecast
    ports:
      - "8000:8000"
    environment:
      - WORKERS=8    # ← tune this per deployment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s